name: release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
      title:
        description: "Release title"
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test -race ./...

      - name: Build
        run: |
          mkdir -p dist
          GOOS=linux   GOARCH=amd64 go build -trimpath -o dist/kyotee-linux-amd64 .
          GOOS=linux   GOARCH=arm64 go build -trimpath -o dist/kyotee-linux-arm64 .
          GOOS=darwin  GOARCH=arm64 go build -trimpath -o dist/kyotee-darwin-arm64 .
          GOOS=darwin  GOARCH=amd64 go build -trimpath -o dist/kyotee-darwin-amd64 .

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE="${{ inputs.title }}"
          [ -z "$TITLE" ] && TITLE="${{ inputs.tag }}"
          gh release create "${{ inputs.tag }}" dist/* \
            --target "$GITHUB_SHA" \
            --title "$TITLE" \
            --generate-notes
